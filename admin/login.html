<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="description" content="Admin Login - Asom Hindi Bhasi Brahman Mahasabha">
  <title>Admin Login - AHBBM</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-header img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid var(--primary);
    }
    
    .login-header h2 {
      color: var(--primary);
      font-size: 1.5rem;
      margin-bottom: 5px;
    }
    
    .login-header p {
      color: #666;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    .input-group {
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }
    
    .input-group input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s;
    }
    
    .input-group input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(180, 65, 46, 0.1);
    }
    
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
    }
    
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .forgot-password {
      color: var(--primary);
      text-decoration: none;
    }
    
    .forgot-password:hover {
      text-decoration: underline;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, var(--primary), #c94b1f);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(180, 65, 46, 0.4);
    }
    
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .alert {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }
    
    .alert-error {
      background: #fee;
      color: #c33;
      border-left: 4px solid #c33;
    }
    
    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #2e7d32;
    }
    
    .demo-credentials {
      margin-top: 30px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      font-size: 0.9rem;
    }
    
    .demo-credentials h4 {
      color: #666;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .demo-credentials p {
      margin-bottom: 5px;
      font-family: monospace;
    }
    
    .back-to-site {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-to-site a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    
    .back-to-site a:hover {
      opacity: 1;
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=🕉️'">
      <h2>Admin Login</h2>
      <p>Asom Hindi Bhasi Brahman Mahasabha</p>
    </div>
    
    <div id="alert-message" class="alert alert-error" style="display: none;"></div>
    
    <form id="loginForm" onsubmit="event.preventDefault(); handleLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Enter username" required autofocus>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter password" required>
          <i class="fas fa-eye password-toggle" onclick="togglePassword()" id="togglePassword"></i>
        </div>
      </div>
      
      <div class="remember-forgot">
        <label class="remember-me">
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#" class="forgot-password" onclick="forgotPassword()">Forgot Password?</a>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    
    <div class="demo-credentials">
      <h4><i class="fas fa-info-circle"></i> Demo Credentials</h4>
      <p><strong>Username:</strong> admin</p>
      <p><strong>Password:</strong> Admin@123</p>
      <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">*Change password after first login</p>
    </div>
    
    <div class="back-to-site">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>
  
  <script src="/js/supabase.js"></script>
  <script>
    // Check if already logged in
    if (db.auth.isAuthenticated()) {
      window.location.href = '/admin/index.html';
    }
    
    async function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const loginBtn = document.getElementById('loginBtn');
      
      // Validate inputs
      if (!username || !password) {
        showAlert('Please enter username and password', 'error');
        return;
      }
      
      try {
        // Disable button
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
        
        // Attempt login
        const admin = await db.auth.login(username, password);
        
        // Set session with remember me preference
        if (remember) {
          sessionStorage.setItem('admin', JSON.stringify(admin));
        } else {
          sessionStorage.setItem('admin', JSON.stringify(admin));
        }
        
        // Show success message
        showAlert('Login successful! Redirecting...', 'success');
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = '/admin/index.html';
        }, 1000);
        
      } catch (error) {
        console.error('Login failed:', error);
        showAlert('Invalid username or password', 'error');
        
        // Re-enable button
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    }
    
    function togglePassword() {
      const password = document.getElementById('password');
      const toggle = document.getElementById('togglePassword');
      
      if (password.type === 'password') {
        password.type = 'text';
        toggle.classList.remove('fa-eye');
        toggle.classList.add('fa-eye-slash');
      } else {
        password.type = 'password';
        toggle.classList.remove('fa-eye-slash');
        toggle.classList.add('fa-eye');
      }
    }
    
    function showAlert(message, type) {
      const alert = document.getElementById('alert-message');
      alert.textContent = message;
      alert.className = `alert alert-${type}`;
      alert.style.display = 'flex';
      
      // Auto hide after 3 seconds for success
      if (type === 'success') {
        setTimeout(() => {
          alert.style.display = 'none';
        }, 3000);
      }
    }
    
    function forgotPassword() {
      alert('Please contact the super administrator to reset your password.');
    }
    
    // Handle Enter key
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        handleLogin();
      }
    });
  </script>
</body>
</html>
