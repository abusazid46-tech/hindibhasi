<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Asom Hindi Bhasi Brahman Mahasabha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #fef8f0 0%, #fde5d4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(179, 65, 46, 0.2);
            border: 1px solid rgba(179, 65, 46, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #b3412e;
        }

        .login-header h2 {
            color: #b3412e;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            color: #b3412e;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #f3b28a;
            border-radius: 50px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #b3412e;
            box-shadow: 0 0 0 3px rgba(179, 65, 46, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
        }

        .toggle-password:hover {
            color: #b3412e;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .forgot-link {
            color: #b3412e;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #b3412e, #dd2476);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(179, 65, 46, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-footer a {
            color: #b3412e;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 1.2rem;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .login-btn.loading .loading-spinner {
            display: block;
        }

        /* Security Badge */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f3b28a;
            color: #666;
            font-size: 0.8rem;
        }

        .security-badge i {
            color: #2e7d32;
        }

        /* Demo Credentials */
        .demo-credentials {
            background: #fef3e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .demo-credentials p {
            color: #b3412e;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .demo-credentials code {
            background: white;
            padding: 3px 8px;
            border-radius: 5px;
            color: #333;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }

            .remember-forgot {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="../assets/images/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/80x80?text=🕉️'">
                <h2>Admin Login</h2>
                <p>Asom Hindi Bhasi Brahman Mahasabha</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin()">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="admin@ahbbm.org" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="remember">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Login to Dashboard</span>
                    <span class="loading-spinner"></span>
                </button>
            </form>

            <!-- Demo Credentials (Remove in production) -->
            <div class="demo-credentials">
                <p><i class="fas fa-info-circle"></i> Demo Credentials:</p>
                <code>admin@ahbbm.org</code> / <code>admin123</code>
            </div>

            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Secured with Supabase Authentication</span>
            </div>

            <div class="login-footer">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        // Check if already logged in
        if (sessionStorage.getItem('admin')) {
            window.location.href = 'dashboard.html';
        }

        function togglePassword() {
            const password = document.getElementById('password');
            const icon = document.querySelector('.toggle-password i');
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');

            // Clear previous errors
            errorMsg.classList.remove('show');
            
            // Validate inputs
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                // First, try to authenticate with Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) {
                    // Fallback to custom admins table
                    const { data, error } = await supabase
                        .from('admins')
                        .select('*')
                        .eq('email', email)
                        .single();

                    if (error || !data) {
                        throw new Error('Invalid credentials');
                    }

                    // Simple password check (in production, use proper hashing)
                    // This is just for demo - use bcrypt or Supabase Auth in production
                    if (btoa(password) !== data.password_hash) {
                        throw new Error('Invalid credentials');
                    }

                    // Store admin session
                    const adminData = {
                        id: data.id,
                        email: data.email,
                        full_name: data.full_name,
                        role: data.role
                    };

                    if (remember) {
                        localStorage.setItem('admin', JSON.stringify(adminData));
                    } else {
                        sessionStorage.setItem('admin', JSON.stringify(adminData));
                    }

                    // Log login activity
                    await logLoginActivity(data.id, 'custom');

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Using Supabase Auth
                    const { data: adminData, error: adminError } = await supabase
                        .from('admins')
                        .select('*')
                        .eq('email', email)
                        .single();

                    if (adminError || !adminData) {
                        throw new Error('Admin not found');
                    }

                    const userData = {
                        id: adminData.id,
                        email: adminData.email,
                        full_name: adminData.full_name,
                        role: adminData.role,
                        auth_id: authData.user.id
                    };

                    if (remember) {
                        localStorage.setItem('admin', JSON.stringify(userData));
                    } else {
                        sessionStorage.setItem('admin', JSON.stringify(userData));
                    }

                    // Log login activity
                    await logLoginActivity(adminData.id, 'supabase_auth');

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                }

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login failed. Please check your credentials.');
            } finally {
                // Remove loading state
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        async function logLoginActivity(adminId, method) {
            try {
                // You can create a login_logs table to track logins
                const { error } = await supabase
                    .from('login_logs')
                    .insert([{
                        admin_id: adminId,
                        login_method: method,
                        ip_address: 'client_ip', // You'd get this from server
                        user_agent: navigator.userAgent
                    }]);

                if (error) console.error('Error logging login:', error);
            } catch (error) {
                console.error('Error logging login:', error);
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.add('show');
        }

        function forgotPassword() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('Please enter your email address first');
                return;
            }

            // Implement password reset functionality
            alert(`Password reset link will be sent to ${email}. This feature is under development.`);
        }

        // Add keyboard shortcut (Ctrl+Shift+L to focus login)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'L') {
                e.preventDefault();
                document.getElementById('email').focus();
            }
        });

        // Auto-fill demo credentials (remove in production)
        document.addEventListener('DOMContentLoaded', function() {
            // For demo purposes only
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('demo') === 'true') {
                document.getElementById('email').value = 'admin@ahbbm.org';
                document.getElementById('password').value = 'admin123';
            }
        });
    </script>
</body>
</html>
