<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pooja Types Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f5f5f5; display: flex; min-height: 100vh; }
        
        .sidebar { width: 280px; background: linear-gradient(180deg, #b3412e 0%, #8b2c1d 100%); color: white; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid gold; }
        .sidebar-menu { padding: 20px 0; }
        .menu-item { padding: 12px 25px; display: flex; align-items: center; gap: 15px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; border-left: 4px solid transparent; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: gold; }
        .menu-item i { width: 22px; }
        
        .main-content { flex: 1; margin-left: 280px; padding: 30px; }
        .top-bar { background: white; padding: 15px 30px; border-radius: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 24px; color: #2d1f00; display: flex; align-items: center; gap: 10px; }
        .add-btn { background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .pooja-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .pooja-card { background: white; border-radius: 30px 10px 30px 10px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-left: 6px solid #b3412e; }
        .pooja-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .pooja-name { font-size: 20px; font-weight: 700; color: #2d1f00; }
        .pooja-price { font-size: 18px; font-weight: 700; color: #27ae60; }
        .pooja-desc { color: #666; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        .samagri-info { background: #f0f9f0; padding: 12px; border-radius: 12px; margin-bottom: 15px; }
        .samagri-link { color: #b3412e; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .action-btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .edit-btn { background: #f39c12; color: white; }
        .delete-btn { background: #e74c3c; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 40px 10px 40px 10px; padding: 40px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 15px; border: 2px solid #f3b28a; border-radius: 15px; }
        .file-info { margin-top: 10px; padding: 10px; background: #f0f9f0; border-radius: 10px; display: none; }
        .save-btn { background: linear-gradient(45deg, #b3412e, #c94b1f); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: 600; cursor: pointer; width: 100%; }
        
        @media (max-width: 1024px) { .sidebar { width: 80px; } .sidebar-header h3, .menu-item span { display: none; } .main-content { margin-left: 80px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo"><h3>Admin</h3></div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="members.html" class="menu-item"><i class="fas fa-users"></i><span>Members</span></a>
            <a href="events.html" class="menu-item"><i class="fas fa-calendar-alt"></i><span>Events</span></a>
            <a href="news.html" class="menu-item"><i class="fas fa-newspaper"></i><span>News</span></a>
            <a href="gallery.html" class="menu-item"><i class="fas fa-images"></i><span>Gallery</span></a>
            <a href="donations.html" class="menu-item"><i class="fas fa-hand-holding-heart"></i><span>Donations</span></a>
            <a href="documents.html" class="menu-item"><i class="fas fa-file-pdf"></i><span>Documents</span></a>
            <a href="contacts.html" class="menu-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <a href="pooja-bookings.html" class="menu-item"><i class="fas fa-pray"></i><span>Pooja Bookings</span></a>
            <a href="pooja-types.html" class="menu-item active"><i class="fas fa-list"></i><span>Pooja Types</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            <a href="#" class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><i class="fas fa-list"></i><span>Pooja Types Management</span></div>
            <button class="add-btn" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Pooja Type</button>
        </div>

        <div class="pooja-grid" id="poojaGrid">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <!-- Pooja Type Modal -->
    <div class="modal" id="poojaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Pooja Type</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="poojaForm">
                <div class="form-group">
                    <label>Name (English)</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Name (Hindi)</label>
                    <input type="text" id="nameHi">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Base Price (₹)</label>
                    <input type="number" id="basePrice" required min="0">
                </div>
                <div class="form-group">
                    <label>Samagri Price (₹)</label>
                    <input type="number" id="samagriPrice" min="0" value="0">
                </div>
                <div class="form-group">
                    <label>Samagri List PDF</label>
                    <input type="file" id="samagriPdf" accept=".pdf">
                    <div class="file-info" id="fileInfo">
                        <i class="fas fa-file-pdf"></i> <span id="fileName"></span>
                    </div>
                    <small>Upload PDF file containing samagri list</small>
                </div>
                <div class="form-group">
                    <label>Display Order</label>
                    <input type="number" id="displayOrder" min="0" value="0">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="isActive" checked>
                    <label>Active</label>
                </div>
                <button type="submit" class="save-btn">Save Pooja Type</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rhslmpccqrfgsaqhwwnl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc2xtcGNjcXJmZ3NhcWh3d25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU0ODEsImV4cCI6MjA4OTIzMTQ4MX0.D3CJvzcSkaFZivDJtIXdKgFO3jUPBOq8i80Vz98eYcw';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let editingId = null;
        let selectedFile = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            loadPoojaTypes();
        });

        async function loadPoojaTypes() {
            const { data, error } = await supabase.from('pooja_types').select('*').order('display_order');
            const grid = document.getElementById('poojaGrid');
            
            if (error || !data || data.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px;">No pooja types found</div>';
                return;
            }
            
            grid.innerHTML = data.map(pt => `
                <div class="pooja-card">
                    <div class="pooja-header">
                        <span class="pooja-name">${escapeHtml(pt.name)}</span>
                        <span class="pooja-price">₹${pt.base_price}</span>
                    </div>
                    <div class="pooja-desc">${escapeHtml(pt.description || 'No description')}</div>
                    <div class="samagri-info">
                        <strong>Samagri Price:</strong> ₹${pt.samagri_price}<br>
                        ${pt.samagri_list_url ? `<a href="${pt.samagri_list_url}" class="samagri-link" target="_blank"><i class="fas fa-file-pdf"></i> Download Samagri List</a>` : '<span class="samagri-link" style="color:#999;">No samagri list uploaded</span>'}
                    </div>
                    <div class="card-actions">
                        <button class="action-btn edit-btn" onclick="editPoojaType('${pt.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="action-btn delete-btn" onclick="deletePoojaType('${pt.id}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        window.showAddModal = function() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add Pooja Type';
            document.getElementById('poojaForm').reset();
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('poojaModal').classList.add('show');
        };

        window.editPoojaType = async function(id) {
            editingId = id;
            const { data } = await supabase.from('pooja_types').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('modalTitle').textContent = 'Edit Pooja Type';
                document.getElementById('name').value = data.name;
                document.getElementById('nameHi').value = data.name_hi || '';
                document.getElementById('description').value = data.description || '';
                document.getElementById('basePrice').value = data.base_price;
                document.getElementById('samagriPrice').value = data.samagri_price;
                document.getElementById('displayOrder').value = data.display_order;
                document.getElementById('isActive').checked = data.is_active;
                document.getElementById('poojaModal').classList.add('show');
            }
        };

        document.getElementById('samagriPdf').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                selectedFile = file;
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('fileName').textContent = file.name;
            } else {
                alert('Please select a PDF file');
                this.value = '';
            }
        });

        document.getElementById('poojaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let samagriListUrl = null;
            
            if (selectedFile) {
                const fileName = `samagri-lists/${Date.now()}_${selectedFile.name}`;
                const { error: uploadError } = await supabase.storage.from('documents').upload(fileName, selectedFile);
                if (uploadError) {
                    alert('PDF upload failed: ' + uploadError.message);
                    return;
                }
                const { data: { publicUrl } } = supabase.storage.from('documents').getPublicUrl(fileName);
                samagriListUrl = publicUrl;
            }
            
            const poojaData = {
                name: document.getElementById('name').value,
                name_hi: document.getElementById('nameHi').value || null,
                description: document.getElementById('description').value || null,
                base_price: parseFloat(document.getElementById('basePrice').value),
                samagri_price: parseFloat(document.getElementById('samagriPrice').value),
                display_order: parseInt(document.getElementById('displayOrder').value),
                is_active: document.getElementById('isActive').checked
            };
            
            if (samagriListUrl) poojaData.samagri_list_url = samagriListUrl;
            
            let result;
            if (editingId) {
                result = await supabase.from('pooja_types').update(poojaData).eq('id', editingId);
            } else {
                result = await supabase.from('pooja_types').insert([poojaData]);
            }
            
            if (result.error) {
                alert('Error: ' + result.error.message);
            } else {
                alert(editingId ? 'Pooja type updated!' : 'Pooja type added!');
                closeModal();
                loadPoojaTypes();
                selectedFile = null;
            }
        });

        window.deletePoojaType = async function(id) {
            if (!confirm('Are you sure you want to delete this pooja type?')) return;
            const { error } = await supabase.from('pooja_types').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else { alert('Deleted'); loadPoojaTypes(); }
        };

        window.closeModal = function() {
            document.getElementById('poojaModal').classList.remove('show');
            selectedFile = null;
        };

        window.logout = async function() {
            await supabase.auth.signOut();
            sessionStorage.removeItem('adminInfo');
            window.location.href = 'login.html';
        };

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    </script>
</body>
</html>
