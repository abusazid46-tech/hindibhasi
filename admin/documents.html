<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Management - AHBBM Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .document-categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .category-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .category-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    .category-card.active {
      border-color: var(--secondary);
      background: #fff9f0;
    }
    
    .category-card i {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 10px;
    }
    
    .category-card h4 {
      color: var(--primary);
      margin-bottom: 5px;
    }
    
    .category-card span {
      color: #999;
      font-size: 0.9rem;
    }
    
    .documents-list {
      background: white;
      border-radius: 15px;
      padding: 20px;
    }
    
    .document-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }
    
    .document-item:hover {
      background: #f9f9f9;
    }
    
    .document-icon {
      width: 50px;
      height: 50px;
      background: #f0f0f0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--primary);
      margin-right: 15px;
    }
    
    .document-info {
      flex: 1;
    }
    
    .document-info h4 {
      color: var(--primary);
      margin-bottom: 5px;
    }
    
    .document-info p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 5px;
    }
    
    .document-meta {
      display: flex;
      gap: 20px;
      font-size: 0.8rem;
      color: #999;
    }
    
    .document-actions {
      display: flex;
      gap: 10px;
    }
    
    .upload-area-docs {
      border: 2px dashed var(--secondary);
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      margin-bottom: 30px;
      cursor: pointer;
      background: #f9f9f9;
    }
    
    .upload-area-docs:hover {
      background: #fff9f0;
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <!-- ... sidebar content ... -->
    </div>
    
    <div class="main-content">
      <div class="page-header">
        <h2>Document Management</h2>
        <button class="btn" onclick="showUploadModal()">
          <i class="fas fa-cloud-upload-alt"></i> Upload Document
        </button>
      </div>
      
      <!-- Categories -->
      <div class="document-categories">
        <div class="category-card active" onclick="filterCategory('all')">
          <i class="fas fa-folder-open"></i>
          <h4>All Documents</h4>
          <span id="count-all">0</span>
        </div>
        <div class="category-card" onclick="filterCategory('constitution')">
          <i class="fas fa-gavel"></i>
          <h4>Constitution</h4>
          <span id="count-constitution">0</span>
        </div>
        <div class="category-card" onclick="filterCategory('forms')">
          <i class="fas fa-file-signature"></i>
          <h4>Forms</h4>
          <span id="count-forms">0</span>
        </div>
        <div class="category-card" onclick="filterCategory('minutes')">
          <i class="fas fa-clipboard-list"></i>
          <h4>Minutes</h4>
          <span id="count-minutes">0</span>
        </div>
        <div class="category-card" onclick="filterCategory('reports')">
          <i class="fas fa-chart-bar"></i>
          <h4>Reports</h4>
          <span id="count-reports">0</span>
        </div>
        <div class="category-card" onclick="filterCategory('financial')">
          <i class="fas fa-rupee-sign"></i>
          <h4>Financial</h4>
          <span id="count-financial">0</span>
        </div>
      </div>
      
      <!-- Upload Area -->
      <div class="upload-area-docs" onclick="document.getElementById('doc-upload').click()">
        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--secondary);"></i>
        <h3>Click to Upload Document</h3>
        <p>or drag and drop files here</p>
        <small>Supported: PDF, DOC, DOCX, XLS, XLSX, TXT (Max 10MB)</small>
        <input type="file" id="doc-upload" style="display: none;" onchange="handleDocumentUpload(this.files)">
      </div>
      
      <!-- Documents List -->
      <div class="documents-list">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
          <h3>Documents</h3>
          <input type="text" placeholder="Search documents..." style="padding: 8px 15px; border: 1px solid #ddd; border-radius: 30px;">
        </div>
        
        <div id="documents-container">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Upload Modal -->
  <div class="modal" id="uploadModal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h3>Upload Document</h3>
        <span class="close-modal" onclick="closeUploadModal()">&times;</span>
      </div>
      
      <form onsubmit="event.preventDefault(); uploadDocument()">
        <div class="form-group">
          <label>Document Title *</label>
          <input type="text" id="doc-title" required>
        </div>
        
        <div class="form-group">
          <label>Description</label>
          <textarea id="doc-description" rows="3"></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Category *</label>
            <select id="doc-category" required>
              <option value="">Select Category</option>
              <option value="constitution">Constitution</option>
              <option value="forms">Forms</option>
              <option value="minutes">Meeting Minutes</option>
              <option value="reports">Annual Reports</option>
              <option value="financial">Financial</option>
              <option value="other">Other</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Language</label>
            <select id="doc-language">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="as">Assamese</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label>Document File *</label>
          <input type="file" id="doc-file" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt" required>
        </div>
        
        <div class="form-group">
          <label>
            <input type="checkbox" id="doc-public" checked> Make publicly accessible
          </label>
        </div>
        
        <button type="submit" class="btn" style="width: 100%;">Upload Document</button>
      </form>
    </div>
  </div>
  
  <script src="/js/supabase.js"></script>
  <script>
    let currentCategory = 'all';
    let documents = [];
    
    document.addEventListener('DOMContentLoaded', function() {
      if (!db.auth.requireAuth()) return;
      loadDocuments();
    });
    
    async function loadDocuments() {
      try {
        const container = document.getElementById('documents-container');
        container.innerHTML = '<div class="spinner"></div>';
        
        // Mock data
        documents = generateMockDocuments();
        displayDocuments(documents);
        updateCategoryCounts();
        
      } catch (error) {
        console.error('Error loading documents:', error);
      }
    }
    
    function generateMockDocuments() {
      return [
        {
          id: 1,
          title: 'Organization Constitution',
          description: 'Official constitution and bye-laws',
          category: 'constitution',
          fileType: 'pdf',
          fileSize: '2.5 MB',
          uploadDate: '2026-01-15',
          downloads: 245
        },
        {
          id: 2,
          title: 'Membership Application Form',
          description: 'Form for new membership',
          category: 'forms',
          fileType: 'pdf',
          fileSize: '500 KB',
          uploadDate: '2026-02-10',
          downloads: 189
        },
        {
          id: 3,
          title: 'Annual Report 2025-2026',
          description: 'Complete annual report',
          category: 'reports',
          fileType: 'pdf',
          fileSize: '5.2 MB',
          uploadDate: '2026-03-31',
          downloads: 567
        },
        {
          id: 4,
          title: 'March 2026 Meeting Minutes',
          description: 'Executive committee meeting',
          category: 'minutes',
          fileType: 'docx',
          fileSize: '1.2 MB',
          uploadDate: '2026-03-15',
          downloads: 78
        },
        {
          id: 5,
          title: 'Audited Accounts 2025-2026',
          description: 'Financial statements',
          category: 'financial',
          fileType: 'pdf',
          fileSize: '3.1 MB',
          uploadDate: '2026-03-31',
          downloads: 156
        }
      ];
    }
    
    function displayDocuments(docs) {
      const container = document.getElementById('documents-container');
      container.innerHTML = '';
      
      if (!docs || docs.length === 0) {
        container.innerHTML = '<p style="text-align: center;">No documents found</p>';
        return;
      }
      
      docs.forEach(doc => {
        container.appendChild(createDocumentItem(doc));
      });
    }
    
    function createDocumentItem(doc) {
      const div = document.createElement('div');
      div.className = 'document-item';
      
      let icon = 'fa-file-pdf';
      if (doc.fileType === 'docx') icon = 'fa-file-word';
      else if (doc.fileType === 'xlsx') icon = 'fa-file-excel';
      
      div.innerHTML = `
        <div class="document-icon">
          <i class="fas ${icon}"></i>
        </div>
        <div class="document-info">
          <h4>${doc.title}</h4>
          <p>${doc.description}</p>
          <div class="document-meta">
            <span><i class="far fa-calendar"></i> ${doc.uploadDate}</span>
            <span><i class="fas fa-database"></i> ${doc.fileSize}</span>
            <span><i class="fas fa-download"></i> ${doc.downloads} downloads</span>
          </div>
        </div>
        <div class="document-actions">
          <button class="btn-icon btn-edit" onclick="editDocument('${doc.id}')" title="Edit">
            <i class="fas fa-edit"></i>
          </button>
          <button class="btn-icon btn-delete" onclick="deleteDocument('${doc.id}')" title="Delete">
            <i class="fas fa-trash"></i>
          </button>
          <button class="btn-icon btn-view" onclick="downloadDocument('${doc.id}')" title="Download">
            <i class="fas fa-download"></i>
          </button>
        </div>
      `;
      
      return div;
    }
    
    function filterCategory(category) {
      currentCategory = category;
      
      document.querySelectorAll('.category-card').forEach(card => {
        card.classList.remove('active');
      });
      event.target.closest('.category-card').classList.add('active');
      
      if (category === 'all') {
        displayDocuments(documents);
      } else {
        const filtered = documents.filter(doc => doc.category === category);
        displayDocuments(filtered);
      }
    }
    
    function showUploadModal() {
      document.getElementById('uploadModal').classList.add('show');
    }
    
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('show');
    }
    
    async function uploadDocument() {
      try {
        const formData = {
          title: document.getElementById('doc-title').value,
          description: document.getElementById('doc-description').value,
          category: document.getElementById('doc-category').value,
          language: document.getElementById('doc-language').value,
          is_public: document.getElementById('doc-public').checked
        };
        
        // Handle file upload
        const file = document.getElementById('doc-file').files[0];
        if (file) {
          // Upload to storage
          const fileUrl = await db.storage.uploadFile('documents', file);
          formData.file_url = fileUrl;
          formData.file_type = file.name.split('.').pop();
          formData.file_size = (file.size / 1024 / 1024).toFixed(2) + ' MB';
        }
        
        showNotification('Document uploaded successfully', 'success');
        closeUploadModal();
        loadDocuments();
        
      } catch (error) {
        console.error('Error uploading document:', error);
        showNotification('Failed to upload document', 'error');
      }
    }
    
    function updateCategoryCounts() {
      const counts = {
        all: documents.length,
        constitution: documents.filter(d => d.category === 'constitution').length,
        forms: documents.filter(d => d.category === 'forms').length,
        minutes: documents.filter(d => d.category === 'minutes').length,
        reports: documents.filter(d => d.category === 'reports').length,
        financial: documents.filter(d => d.category === 'financial').length
      };
      
      document.getElementById('count-all').textContent = counts.all;
      document.getElementById('count-constitution').textContent = counts.constitution;
      document.getElementById('count-forms').textContent = counts.forms;
      document.getElementById('count-minutes').textContent = counts.minutes;
      document.getElementById('count-reports').textContent = counts.reports;
      document.getElementById('count-financial').textContent = counts.financial;
    }
    
    async function deleteDocument(id) {
      if (confirm('Are you sure you want to delete this document?')) {
        try {
          showNotification('Document deleted successfully', 'success');
          loadDocuments();
        } catch (error) {
          showNotification('Failed to delete document', 'error');
        }
      }
    }
  </script>
</body>
</html>
