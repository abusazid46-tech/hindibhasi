<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #b3412e 0%, #8b2c1d 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        .sidebar-header h3 {
            font-size: 18px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: gold;
        }

        .menu-item i {
            width: 22px;
        }

        .menu-item .badge {
            margin-left: auto;
            background: gold;
            color: #b3412e;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 12px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .top-bar {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            color: #2d1f00;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: none;
            border: 2px solid #f3b28a;
            color: #b3412e;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 6px solid;
        }

        .stat-card.new { border-left-color: #f39c12; }
        .stat-card.read { border-left-color: #3498db; }
        .stat-card.replied { border-left-color: #27ae60; }
        .stat-card.urgent { border-left-color: #e74c3c; }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .stat-title {
            color: #666;
            font-size: 14px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #2d1f00;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 14px;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
        }

        .filter-select select,
        .filter-select input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 14px;
            background: white;
        }

        .date-range {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .date-range .filter-select {
            min-width: 130px;
        }

        /* Messages Table */
        .messages-container {
            background: white;
            border-radius: 30px 10px 30px 10px;
            padding: 25px;
            overflow-x: auto;
        }

        .messages-table {
            width: 100%;
            border-collapse: collapse;
        }

        .messages-table th {
            text-align: left;
            padding: 15px 10px;
            color: #2d1f00;
            font-weight: 600;
            border-bottom: 3px solid #e67e22;
        }

        .messages-table td {
            padding: 15px 10px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        .message-row {
            cursor: pointer;
            transition: background 0.3s;
        }

        .message-row:hover {
            background: #fef8f0;
        }

        .message-row.unread {
            font-weight: 600;
            background: #fff9e6;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .status-new {
            background: #fef5e7;
            color: #f39c12;
        }

        .status-read {
            background: #e8f0fe;
            color: #3498db;
        }

        .status-replied {
            background: #e8f5e9;
            color: #27ae60;
        }

        .urgent-badge {
            background: #e74c3c;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 5px;
        }

        .action-btns {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .view-btn {
            background: #3498db;
            color: white;
        }

        .reply-btn {
            background: #27ae60;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #e67e22;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .page-btn.active {
            background: #e67e22;
            color: white;
        }

        /* Message Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px 10px 40px 10px;
            padding: 40px;
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .message-detail {
            margin-bottom: 20px;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }

        .detail-value {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 15px;
            color: #2d1f00;
        }

        .reply-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .reply-section textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            margin-bottom: 15px;
            resize: vertical;
        }

        .send-reply-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }
            .sidebar-header h3, .sidebar-header p, .menu-item span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            .filter-bar {
                flex-direction: column;
            }
            .date-range {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo">
            <h3 id="adminName">Admin</h3>
            <p>Admin</p>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="members.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span>Members</span>
            </a>
            <a href="events.html" class="menu-item">
                <i class="fas fa-calendar-alt"></i>
                <span>Events</span>
            </a>
            <a href="news.html" class="menu-item">
                <i class="fas fa-newspaper"></i>
                <span>News</span>
            </a>
            <a href="gallery.html" class="menu-item">
                <i class="fas fa-images"></i>
                <span>Gallery</span>
            </a>
            <a href="donations.html" class="menu-item">
                <i class="fas fa-hand-holding-heart"></i>
                <span>Donations</span>
            </a>
            <a href="documents.html" class="menu-item">
                <i class="fas fa-file-pdf"></i>
                <span>Documents</span>
            </a>
            <a href="contacts.html" class="menu-item active">
                <i class="fas fa-envelope"></i>
                <span>Messages</span>
                <span class="badge" id="newMessagesBadge">0</span>
            </a>
            <div class="menu-divider"></div>
            <a href="#" class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <i class="fas fa-envelope"></i>
                <span>Contact Messages</span>
            </div>
            
            <div class="admin-info">
                <span id="headerAdminName">Admin</span>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsCards">
            <div class="stat-card new">
                <div class="stat-header">
                    <span class="stat-title">New Messages</span>
                    <i class="fas fa-envelope" style="color: #f39c12;"></i>
                </div>
                <div class="stat-value" id="statNew">0</div>
            </div>
            
            <div class="stat-card read">
                <div class="stat-header">
                    <span class="stat-title">Read</span>
                    <i class="fas fa-book-open" style="color: #3498db;"></i>
                </div>
                <div class="stat-value" id="statRead">0</div>
            </div>
            
            <div class="stat-card replied">
                <div class="stat-header">
                    <span class="stat-title">Replied</span>
                    <i class="fas fa-check-circle" style="color: #27ae60;"></i>
                </div>
                <div class="stat-value" id="statReplied">0</div>
            </div>
            
            <div class="stat-card urgent">
                <div class="stat-header">
                    <span class="stat-title">Urgent</span>
                    <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                </div>
                <div class="stat-value" id="statUrgent">0</div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, email, phone, subject..." onkeyup="debounceSearch()">
            </div>
            
            <div class="filter-select">
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="all">All Status</option>
                    <option value="new">New</option>
                    <option value="read">Read</option>
                    <option value="replied">Replied</option>
                </select>
            </div>
            
            <div class="date-range">
                <div class="filter-select">
                    <input type="date" id="fromDate" placeholder="From" onchange="applyFilters()">
                </div>
                <div class="filter-select">
                    <input type="date" id="toDate" placeholder="To" onchange="applyFilters()">
                </div>
            </div>
        </div>

        <!-- Messages Table -->
        <div class="messages-container">
            <table class="messages-table">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>From</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="messagesTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px;">
                            <i class="fas fa-spinner fa-spin"></i> Loading messages...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Message Detail Modal -->
    <div class="modal" id="messageModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Message Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="../js/contact.js"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://rhslmpccqrfgsaqhwwnl.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc2xtcGNjcXJmZ3NhcWh3d25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU0ODEsImV4cCI6MjA4OTIzMTQ4MX0.D3CJvzcSkaFZivDJtIXdKgFO3jUPBOq8i80Vz98eYcw';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Initialize ContactModule
            ContactModule.init(supabase);

            // State
            let currentPage = 1;
            let totalPages = 1;
            let currentFilters = {
                status: 'all',
                search: '',
                from_date: '',
                to_date: '',
                sort: 'newest'
            };
            let searchTimeout;
            let currentMessageId = null;

            // Check auth
            document.addEventListener('DOMContentLoaded', async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                
                // Get admin info
                const storedAdmin = sessionStorage.getItem('adminInfo');
                if (storedAdmin) {
                    const admin = JSON.parse(storedAdmin);
                    document.getElementById('adminName').textContent = admin.name;
                    document.getElementById('headerAdminName').textContent = admin.name;
                }
                
                await loadStats();
                await loadMessages();
            });

            async function loadStats() {
                const result = await ContactModule.getStats();
                
                if (result.success) {
                    document.getElementById('statNew').textContent = result.data.new;
                    document.getElementById('statRead').textContent = result.data.read;
                    document.getElementById('statReplied').textContent = result.data.replied;
                    document.getElementById('statUrgent').textContent = result.data.urgent;
                    document.getElementById('newMessagesBadge').textContent = result.data.new;
                }
            }

            async function loadMessages() {
                const tbody = document.getElementById('messagesTableBody');
                
                // Get date filters
                currentFilters.from_date = document.getElementById('fromDate').value || null;
                currentFilters.to_date = document.getElementById('toDate').value || null;
                
                const result = await ContactModule.getAllMessages(currentFilters, currentPage, 20);
                
                if (result.success) {
                    const { data, totalPages: pages } = result;
                    totalPages = pages;
                    
                    if (data && data.length > 0) {
                        tbody.innerHTML = data.map(msg => {
                            const statusClass = `status-${msg.status}`;
                            const statusLabel = ContactModule.statusLabels[msg.status] || msg.status;
                            const isUnread = msg.status === 'new' ? 'unread' : '';
                            
                            return `
                                <tr class="message-row ${isUnread}" onclick="viewMessage('${msg.id}')">
                                    <td>
                                        <span class="status-badge ${statusClass}">${statusLabel}</span>
                                        ${msg.is_urgent ? '<span class="urgent-badge">URGENT</span>' : ''}
                                    </td>
                                    <td>
                                        <strong>${ContactModule.helpers.escapeHtml(msg.name)}</strong>
                                        <br>
                                        <small>${msg.phone}${msg.email ? ' | ' + msg.email : ''}</small>
                                    </td>
                                    <td>${ContactModule.helpers.escapeHtml(msg.subject)}</td>
                                    <td>${ContactModule.helpers.formatDate(msg.created_at)}</td>
                                    <td onclick="event.stopPropagation()">
                                        <div class="action-btns">
                                            <button class="action-btn view-btn" onclick="viewMessage('${msg.id}')">
                                                <i class="fas fa-eye"></i>
                                            </button>
                                            <button class="action-btn reply-btn" onclick="replyToMessage('${msg.id}')">
                                                <i class="fas fa-reply"></i>
                                            </button>
                                            <button class="action-btn delete-btn" onclick="deleteMessage('${msg.id}')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        }).join('');
                    } else {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">No messages found</td></tr>';
                    }
                    
                    renderPagination();
                }
            }

            function renderPagination() {
                const pagination = document.getElementById('pagination');
                
                if (totalPages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }
                
                let html = '';
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" 
                            onclick="changePage(${i})">${i}</button>`;
                }
                
                pagination.innerHTML = html;
            }

            window.changePage = function(page) {
                currentPage = page;
                loadMessages();
            };

            window.applyFilters = function() {
                currentFilters.status = document.getElementById('statusFilter').value;
                currentFilters.search = document.getElementById('searchInput').value;
                currentPage = 1;
                loadMessages();
            };

            window.debounceSearch = function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    applyFilters();
                }, 500);
            };

            window.viewMessage = async function(messageId) {
                const result = await ContactModule.getMessageById(messageId);
                
                if (result.success) {
                    const msg = result.data;
                    currentMessageId = messageId;
                    
                    // Mark as read if new
                    if (msg.status === 'new') {
                        await ContactModule.markAsRead(messageId);
                        loadStats();
                    }
                    
                    const modalContent = document.getElementById('modalContent');
                    modalContent.innerHTML = `
                        <div class="message-detail">
                            <span class="detail-label">From</span>
                            <div class="detail-value">
                                <strong>${ContactModule.helpers.escapeHtml(msg.name)}</strong><br>
                                📞 ${msg.phone}<br>
                                ✉️ ${msg.email || 'Not provided'}
                            </div>
                        </div>
                        
                        <div class="message-detail">
                            <span class="detail-label">Subject</span>
                            <div class="detail-value">
                                ${ContactModule.helpers.escapeHtml(msg.subject)}
                                ${msg.is_urgent ? '<span class="urgent-badge" style="margin-left: 10px;">URGENT</span>' : ''}
                            </div>
                        </div>
                        
                        <div class="message-detail">
                            <span class="detail-label">Message</span>
                            <div class="detail-value" style="white-space: pre-line;">
                                ${ContactModule.helpers.escapeHtml(msg.message)}
                            </div>
                        </div>
                        
                        <div class="message-detail">
                            <span class="detail-label">Received</span>
                            <div class="detail-value">
                                ${ContactModule.helpers.formatDate(msg.created_at)}
                            </div>
                        </div>
                        
                        ${msg.response ? `
                            <div class="message-detail">
                                <span class="detail-label">Your Response</span>
                                <div class="detail-value" style="background: #e8f5e9;">
                                    ${ContactModule.helpers.escapeHtml(msg.response)}
                                    <br><small>Replied on ${ContactModule.helpers.formatDate(msg.responded_at)}</small>
                                </div>
                            </div>
                        ` : `
                            <div class="reply-section">
                                <h3>Send Reply</h3>
                                <textarea id="replyMessage" rows="4" placeholder="Type your reply here..."></textarea>
                                <button class="send-reply-btn" onclick="sendReply('${messageId}')">
                                    <i class="fas fa-paper-plane"></i> Send Reply
                                </button>
                            </div>
                        `}
                    `;
                    
                    document.getElementById('messageModal').classList.add('show');
                }
            };

            window.replyToMessage = function(messageId) {
                viewMessage(messageId);
                // Scroll to reply section
                setTimeout(() => {
                    document.querySelector('.reply-section')?.scrollIntoView({ behavior: 'smooth' });
                }, 200);
            };

            window.sendReply = async function(messageId) {
                const reply = document.getElementById('replyMessage').value;
                
                if (!reply.trim()) {
                    alert('Please enter a reply message');
                    return;
                }
                
                const result = await ContactModule.markAsReplied(messageId, reply);
                
                if (result.success) {
                    alert('Reply sent successfully!');
                    closeModal();
                    loadMessages();
                    loadStats();
                    
                    // Here you would also send an email
                    // await ContactModule.sendEmailReply(msg.email, 'Re: ' + msg.subject, reply);
                } else {
                    alert('Error sending reply: ' + result.error);
                }
            };

            window.deleteMessage = async function(messageId) {
                if (!confirm('Are you sure you want to delete this message?')) return;
                
                const result = await ContactModule.deleteMessage(messageId);
                
                if (result.success) {
                    alert('Message deleted');
                    loadMessages();
                    loadStats();
                    closeModal();
                } else {
                    alert('Error deleting message: ' + result.error);
                }
            };

            window.closeModal = function() {
                document.getElementById('messageModal').classList.remove('show');
                currentMessageId = null;
            };

            window.logout = async function() {
                await supabase.auth.signOut();
                sessionStorage.removeItem('adminInfo');
                window.location.href = 'login.html';
            };

            // Refresh stats periodically
            setInterval(loadStats, 30000); // Every 30 seconds
        })();
    </script>
</body>
</html>
