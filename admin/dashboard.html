<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Asom Hindi Bhasi Brahman Mahasabha</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Copy all the dashboard styles from previous message */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #b3412e 0%, #8b2c1d 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        .sidebar-header h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 13px;
            opacity: 0.8;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: gold;
        }

        .menu-item i {
            width: 22px;
            font-size: 18px;
        }

        .menu-item span {
            font-size: 14px;
            font-weight: 500;
        }

        .menu-item .badge {
            margin-left: auto;
            background: gold;
            color: #b3412e;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 15px 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        /* Top Bar */
        .top-bar {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            color: #2d1f00;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title i {
            color: #b3412e;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-info {
            text-align: right;
        }

        .admin-name {
            font-weight: 600;
            color: #2d1f00;
        }

        .admin-role {
            font-size: 13px;
            color: #666;
        }

        .admin-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #fce3d5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b3412e;
            font-size: 20px;
            font-weight: 600;
        }

        .logout-btn {
            background: none;
            border: 2px solid #f3b28a;
            color: #b3412e;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #b3412e;
            color: white;
            border-color: #b3412e;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 30px 10px 30px 10px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-left: 6px solid;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.pending { border-left-color: #f39c12; }
        .stat-card.members { border-left-color: #27ae60; }
        .stat-card.events { border-left-color: #3498db; }
        .stat-card.donations { border-left-color: #9b59b6; }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-title {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .stat-card.pending .stat-icon { background: #fef5e7; color: #f39c12; }
        .stat-card.members .stat-icon { background: #e8f5e9; color: #27ae60; }
        .stat-card.events .stat-icon { background: #e8f0fe; color: #3498db; }
        .stat-card.donations .stat-icon { background: #f3e8ff; color: #9b59b6; }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #2d1f00;
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 13px;
            color: #27ae60;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-change.negative {
            color: #e74c3c;
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 30px 10px 30px 10px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            color: #2d1f00;
            font-size: 18px;
        }

        .chart-header select {
            padding: 8px 15px;
            border: 2px solid #f3b28a;
            border-radius: 30px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        /* Recent Activity */
        .recent-activity {
            background: white;
            border-radius: 30px 10px 30px 10px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h3 {
            color: #2d1f00;
            font-size: 18px;
        }

        .view-all {
            color: #b3412e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #fef8f0;
            border-radius: 15px;
            transition: background 0.3s;
        }

        .activity-item:hover {
            background: #fce3d5;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b3412e;
            font-size: 18px;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            color: #2d1f00;
            margin-bottom: 3px;
        }

        .activity-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 15px;
        }

        .activity-meta i {
            margin-right: 3px;
        }

        .activity-status {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending {
            background: #fef5e7;
            color: #f39c12;
        }

        .status-approved {
            background: #e8f5e9;
            color: #27ae60;
        }

        .status-new {
            background: #e8f0fe;
            color: #3498db;
        }

        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .quick-action-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .quick-action-card:hover {
            transform: translateY(-5px);
            border-color: #f28c38;
            box-shadow: 0 10px 25px rgba(180,60,20,0.1);
        }

        .quick-action-card i {
            font-size: 30px;
            color: #b3412e;
            margin-bottom: 10px;
        }

        .quick-action-card h4 {
            color: #2d1f00;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .quick-action-card p {
            color: #666;
            font-size: 13px;
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #b3412e;
        }

        .loading-spinner i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }
            
            .sidebar-header h3, .sidebar-header p, .menu-item span {
                display: none;
            }
            
            .main-content {
                margin-left: 80px;
            }
            
            .menu-item {
                justify-content: center;
                padding: 15px;
            }
            
            .menu-item i {
                margin: 0;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.show {
                transform: translateX(0);
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .charts-row {
                grid-template-columns: 1fr;
            }
            
            .quick-actions {
                grid-template-columns: 1fr 1fr;
            }
            
            .top-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .admin-profile {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .quick-actions {
                grid-template-columns: 1fr;
            }
            
            .activity-item {
                flex-direction: column;
                text-align: center;
            }
            
            .activity-meta {
                flex-direction: column;
                gap: 5px;
            }
        }

        .coming-soon {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 30px 10px 30px 10px;
            color: #666;
        }

        .coming-soon i {
            font-size: 60px;
            color: #b3412e;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo" onerror="this.src='https://via.placeholder.com/70x70?text=🕉️'">
            <h3 id="adminName">Loading...</h3>
            <p id="adminRole">Loading...</p>
        </div>
        
        <div class="sidebar-menu">
            <a href="#" class="menu-item active" onclick="loadSection('dashboard')">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('members')">
                <i class="fas fa-users"></i>
                <span>Members</span>
                <span class="badge" id="pendingBadge">0</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('events')">
                <i class="fas fa-calendar-alt"></i>
                <span>Events</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('news')">
                <i class="fas fa-newspaper"></i>
                <span>News</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('gallery')">
                <i class="fas fa-images"></i>
                <span>Gallery</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('donations')">
                <i class="fas fa-hand-holding-heart"></i>
                <span>Donations</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('documents')">
                <i class="fas fa-file-pdf"></i>
                <span>Documents</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('contacts')">
                <i class="fas fa-envelope"></i>
                <span>Messages</span>
                <span class="badge" id="messageBadge">0</span>
            </a>
            
            <div class="menu-divider"></div>
            
            <a href="#" class="menu-item" onclick="loadSection('committee')">
                <i class="fas fa-user-tie"></i>
                <span>Committee</span>
            </a>
            <a href="#" class="menu-item" onclick="loadSection('settings')">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
            <a href="#" class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="page-title">
                <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor: pointer; display: none;" id="menuToggle"></i>
                <span id="currentSection">Dashboard</span>
            </div>
            
            <div class="admin-profile">
                <div class="admin-info">
                    <div class="admin-name" id="headerAdminName">Loading...</div>
                    <div class="admin-role" id="headerAdminRole">Loading...</div>
                </div>
                <div class="admin-avatar" id="adminAvatar">A</div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Dynamic Content Area -->
        <div id="contentArea">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading dashboard...</p>
            </div>
        </div>
    </div>
<script>
    // Use a single IIFE to contain all code and avoid global conflicts
    (function() {
        // Supabase configuration - declared only once inside this function
        const SUPABASE_URL = 'https://rhslmpccqrfgsaqhwwnl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc2xtcGNjcXJmZ3NhcWh3d25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU0ODEsImV4cCI6MjA4OTIzMTQ4MX0.D3CJvzcSkaFZivDJtIXdKgFO3jUPBOq8i80Vz98eYcw';
        
        // Initialize Supabase client - only once
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Variables
        let currentAdmin = null;
        let dashboardCharts = {};

        // Check authentication on load
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            loadDashboard();
            loadBadges();
            setupRealtimeSubscriptions();
        });

        // Check authentication
        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                
                // Get admin info
                const storedAdmin = sessionStorage.getItem('adminInfo');
                if (storedAdmin) {
                    currentAdmin = JSON.parse(storedAdmin);
                } else {
                    // If RLS is disabled, this will work
                    const { data: adminData, error } = await supabase
                        .from('admins')
                        .select('*')
                        .eq('id', session.user.id)
                        .single();
                    
                    if (error || !adminData) {
                        console.warn('Admin record not found, but RLS is disabled - allowing access');
                        // Create a default admin object
                        currentAdmin = {
                            id: session.user.id,
                            name: session.user.email?.split('@')[0] || 'Admin',
                            email: session.user.email,
                            role: 'super_admin'
                        };
                    } else {
                        currentAdmin = adminData;
                    }
                    
                    sessionStorage.setItem('adminInfo', JSON.stringify(currentAdmin));
                }
                
                // Update UI with admin info
                document.getElementById('adminName').textContent = currentAdmin.name || 'Admin';
                document.getElementById('adminRole').textContent = (currentAdmin.role || 'super_admin').replace('_', ' ').toUpperCase();
                document.getElementById('headerAdminName').textContent = currentAdmin.name || 'Admin';
                document.getElementById('headerAdminRole').textContent = (currentAdmin.role || 'super_admin').replace('_', ' ').toUpperCase();
                document.getElementById('adminAvatar').textContent = (currentAdmin.name || 'A').charAt(0).toUpperCase();
                
            } catch (error) {
                console.error('Auth check error:', error);
                // Still allow access if RLS is disabled
                console.warn('Proceeding despite error - RLS may be disabled');
            }
        }

        // Load badges (pending counts)
        async function loadBadges() {
            try {
                const { count: pendingCount } = await supabase
                    .from('members')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'pending');
                
                document.getElementById('pendingBadge').textContent = pendingCount || 0;
                
                const { count: messageCount } = await supabase
                    .from('contacts')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'new');
                
                document.getElementById('messageBadge').textContent = messageCount || 0;
                
            } catch (error) {
                console.error('Error loading badges:', error);
            }
        }

        // Setup realtime subscriptions
        function setupRealtimeSubscriptions() {
            try {
                supabase
                    .channel('member-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, () => {
                        loadBadges();
                    })
                    .subscribe();
                
                supabase
                    .channel('contact-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'contacts' }, () => {
                        loadBadges();
                    })
                    .subscribe();
            } catch (error) {
                console.error('Realtime subscription error:', error);
            }
        }

        // Toggle sidebar on mobile
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('show');
        };

        // Logout function
        window.logout = async function() {
            try {
                await supabase.auth.signOut();
                sessionStorage.removeItem('adminInfo');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        };

        // Load dashboard section
        async function loadDashboard() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><p>Loading dashboard...</p></div>';
            
            try {
                // Try to get stats, but don't fail if table doesn't exist
                let stats = {
                    pending_members: 0,
                    total_members: 0,
                    upcoming_events: 0,
                    monthly_donations: 0,
                    monthly_donation_count: 0
                };
                
                try {
                    const { data: statsData } = await supabase
                        .from('dashboard_stats')
                        .select('*')
                        .single();
                    
                    if (statsData) stats = statsData;
                } catch (statsError) {
                    console.warn('Could not load dashboard_stats:', statsError);
                }
                
                // Get recent members
                let recentMembers = [];
                try {
                    const { data: members } = await supabase
                        .from('members')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(5);
                    
                    if (members) recentMembers = members;
                } catch (membersError) {
                    console.warn('Could not load members:', membersError);
                }
                
                // Get recent contacts
                let recentContacts = [];
                try {
                    const { data: contacts } = await supabase
                        .from('contacts')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(5);
                    
                    if (contacts) recentContacts = contacts;
                } catch (contactsError) {
                    console.warn('Could not load contacts:', contactsError);
                }
                
                // Combine activities
                const activities = [
                    ...recentMembers.map(m => ({
                        icon: 'fas fa-user-plus',
                        title: `New member registration: ${m.name || 'Unknown'}`,
                        time: m.created_at ? new Date(m.created_at).toLocaleString() : 'Unknown',
                        status: m.status || 'pending',
                        statusClass: `status-${m.status || 'pending'}`
                    })),
                    ...recentContacts.map(c => ({
                        icon: 'fas fa-envelope',
                        title: `New message from: ${c.name || 'Unknown'}`,
                        time: c.created_at ? new Date(c.created_at).toLocaleString() : 'Unknown',
                        status: c.status || 'new',
                        statusClass: `status-${c.status || 'new'}`
                    }))
                ].sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, 5);

                // Build dashboard HTML
                contentArea.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card pending">
                            <div class="stat-header">
                                <span class="stat-title">Pending Members</span>
                                <div class="stat-icon"><i class="fas fa-user-clock"></i></div>
                            </div>
                            <div class="stat-value">${stats.pending_members || 0}</div>
                        </div>
                        
                        <div class="stat-card members">
                            <div class="stat-header">
                                <span class="stat-title">Total Members</span>
                                <div class="stat-icon"><i class="fas fa-users"></i></div>
                            </div>
                            <div class="stat-value">${stats.total_members || 0}</div>
                        </div>
                        
                        <div class="stat-card events">
                            <div class="stat-header">
                                <span class="stat-title">Upcoming Events</span>
                                <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                            </div>
                            <div class="stat-value">${stats.upcoming_events || 0}</div>
                        </div>
                        
                        <div class="stat-card donations">
                            <div class="stat-header">
                                <span class="stat-title">Monthly Donations</span>
                                <div class="stat-icon"><i class="fas fa-rupee-sign"></i></div>
                            </div>
                            <div class="stat-value">₹${(stats.monthly_donations || 0).toLocaleString()}</div>
                        </div>
                    </div>

                    <div class="recent-activity">
                        <div class="section-header">
                            <h3>Recent Activity</h3>
                        </div>
                        
                        <div class="activity-list">
                            ${activities.length > 0 ? activities.map(activity => `
                                <div class="activity-item">
                                    <div class="activity-icon"><i class="${activity.icon}"></i></div>
                                    <div class="activity-content">
                                        <div class="activity-title">${activity.title}</div>
                                        <div class="activity-meta"><i class="far fa-clock"></i> ${activity.time}</div>
                                    </div>
                                    <div class="activity-status ${activity.statusClass}">${activity.status}</div>
                                </div>
                            `).join('') : '<p>No recent activity</p>'}
                        </div>
                    </div>

                    <div class="quick-actions">
                        <a href="#" class="quick-action-card" onclick="loadSection('members', 'pending')">
                            <i class="fas fa-user-check"></i>
                            <h4>Approve Members</h4>
                            <p>${stats.pending_members || 0} pending</p>
                        </a>
                        
                        <a href="#" class="quick-action-card" onclick="loadSection('events')">
                            <i class="fas fa-calendar-plus"></i>
                            <h4>Add Event</h4>
                            <p>Create new event</p>
                        </a>
                        
                        <a href="#" class="quick-action-card" onclick="loadSection('news')">
                            <i class="fas fa-newspaper"></i>
                            <h4>Post News</h4>
                            <p>Share update</p>
                        </a>
                        
                        <a href="#" class="quick-action-card" onclick="loadSection('gallery')">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <h4>Upload Photos</h4>
                            <p>Add to gallery</p>
                        </a>
                    </div>
                `;

            } catch (error) {
                console.error('Error loading dashboard:', error);
                contentArea.innerHTML = '<div class="error-message">Failed to load dashboard. Please refresh.</div>';
            }
        }

        // Load different sections
        window.loadSection = function(section) {
            // Update active menu
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.menu-item').classList.add('active');
            
            const titles = {
                'dashboard': 'Dashboard',
                'members': 'Member Management',
                'events': 'Event Management',
                'news': 'News Management',
                'gallery': 'Gallery Management',
                'donations': 'Donation Reports',
                'documents': 'Document Management',
                'contacts': 'Contact Messages',
                'committee': 'Committee Management',
                'settings': 'Settings'
            };
            
            document.getElementById('currentSection').textContent = titles[section] || section;
            
            if (section === 'dashboard') {
                loadDashboard();
            } else {
                document.getElementById('contentArea').innerHTML = `
                    <div class="coming-soon">
                        <i class="fas fa-tools"></i>
                        <h3>${titles[section]} Coming Soon</h3>
                        <p>This section is under development</p>
                    </div>
                `;
            }
        };
    })();
</script>
    
</body>
</html>
