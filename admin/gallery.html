<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #b3412e 0%, #8b2c1d 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        .sidebar-header h3 {
            font-size: 18px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: gold;
        }

        .menu-item i {
            width: 22px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .top-bar {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            color: #2d1f00;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-btn {
            background: linear-gradient(45deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 14px;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
        }

        .filter-select select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 14px;
            background: white;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .gallery-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            position: relative;
        }

        .gallery-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(155,89,182,0.15);
        }

        .gallery-card img,
        .gallery-card video {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .gallery-card video {
            background: #000;
        }

        .gallery-info {
            padding: 12px;
        }

        .gallery-title {
            font-size: 14px;
            font-weight: 600;
            color: #2d1f00;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .gallery-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: gold;
            color: #b3412e;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .type-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            backdrop-filter: blur(5px);
        }

        .card-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 5px;
            border: none;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .feature-btn {
            background: #f1c40f;
            color: white;
        }

        .edit-btn {
            background: #f39c12;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #9b59b6;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .page-btn.active {
            background: #9b59b6;
            color: white;
        }

        /* Upload Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px 10px 40px 10px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .upload-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .upload-tab {
            flex: 1;
            padding: 10px;
            border: 2px solid #f3b28a;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .upload-tab.active {
            background: #9b59b6;
            color: white;
            border-color: #9b59b6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d1f00;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 15px;
        }

        .form-group textarea {
            resize: vertical;
        }

        .form-group.checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group.checkbox input {
            width: auto;
        }

        .file-input {
            border: 2px dashed #f3b28a;
            padding: 30px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-input:hover {
            border-color: #9b59b6;
            background: #f8f0ff;
        }

        .file-input i {
            font-size: 40px;
            color: #9b59b6;
            margin-bottom: 10px;
        }

        .preview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-top: 15px;
            border-radius: 15px;
            display: none;
        }

        .upload-btn-submit {
            background: linear-gradient(45deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }
            .sidebar-header h3, .sidebar-header p, .menu-item span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo">
            <h3 id="adminName">Admin</h3>
            <p>Admin</p>
        </div>
        
        
<div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item active"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="members.html" class="menu-item"><i class="fas fa-users"></i><span>Members</span><span class="badge" id="pendingBadge">0</span></a>
            <a href="events.html" class="menu-item"><i class="fas fa-calendar-alt"></i><span>Events</span></a>
            <a href="news.html" class="menu-item"><i class="fas fa-newspaper"></i><span>News</span></a>
            <a href="pooja-bookings.html" class="menu-item"><i class="fas fa-pray"></i><span>Pooja Bookings</span></a>
            <a href="gallery.html" class="menu-item"><i class="fas fa-images"></i><span>Gallery</span></a>
            <a href="donations.html" class="menu-item"><i class="fas fa-hand-holding-heart"></i><span>Donations</span></a>
            <a href="documents.html" class="menu-item"><i class="fas fa-file-pdf"></i><span>Documents</span></a>
            <a href="contacts.html" class="menu-item"><i class="fas fa-envelope"></i><span>Messages</span><span class="badge" id="messageBadge">0</span></a>
            <div class="menu-divider"></div>
            <a href="committee.html" class="menu-item"><i class="fas fa-user-tie"></i><span>Committee</span></a>
            <a href="settings.html" class="menu-item"><i class="fas fa-cog"></i><span>Settings</span></a>
            <a href="#" class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>		
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <i class="fas fa-images"></i>
                <span>Gallery Management</span>
            </div>
            <button class="upload-btn" onclick="showUploadModal()">
                <i class="fas fa-cloud-upload-alt"></i> Upload Media
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by title..." onkeyup="debounceSearch()">
            </div>
            
            <div class="filter-select">
                <select id="typeFilter" onchange="applyFilters()">
                    <option value="all">All Media</option>
                    <option value="image">Images Only</option>
                    <option value="video">Videos Only</option>
                </select>
            </div>
            
            <div class="filter-select">
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="title">By Title</option>
                </select>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <div class="loading-spinner" style="grid-column: 1/-1; text-align: center;">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading gallery...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Upload Media</h2>
                <button class="close-btn" onclick="closeUploadModal()">&times;</button>
            </div>
            
            <div class="upload-tabs">
                <button class="upload-tab active" onclick="switchUploadTab('image')">📷 Image</button>
                <button class="upload-tab" onclick="switchUploadTab('video')">🎥 Video</button>
            </div>
            
            <form id="uploadForm">
                <input type="hidden" id="mediaType" value="image">
                
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="mediaTitle" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="mediaDescription" rows="3"></textarea>
                </div>
                
                <div class="file-input" onclick="document.getElementById('mediaFile').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to select file</p>
                    <small id="fileHint">Supports: JPG, PNG, GIF, MP4 (Max 50MB)</small>
                </div>
                <input type="file" id="mediaFile" style="display: none;" accept="image/*,video/*" onchange="previewFile(this)">
                
                <img id="filePreview" class="preview">
                
                <div class="form-group checkbox">
                    <input type="checkbox" id="isFeatured">
                    <label>Feature this item</label>
                </div>
                
                <button type="submit" class="upload-btn-submit">Upload</button>
            </form>
        </div>
    </div>

    <script src="../js/gallery.js"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://rhslmpccqrfgsaqhwwnl.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc2xtcGNjcXJmZ3NhcWh3d25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU0ODEsImV4cCI6MjA4OTIzMTQ4MX0.D3CJvzcSkaFZivDJtIXdKgFO3jUPBOq8i80Vz98eYcw';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Initialize GalleryModule
            GalleryModule.init(supabase);

            // State
            let currentPage = 1;
            let totalPages = 1;
            let currentFilters = {
                type: 'all',
                search: '',
                sort: 'newest'
            };
            let searchTimeout;

            // Check auth
            document.addEventListener('DOMContentLoaded', async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                loadGallery();
            });

            async function loadGallery() {
                const grid = document.getElementById('galleryGrid');
                
                const result = await GalleryModule.getAllItemsForAdmin(currentFilters, currentPage, 20);
                
                if (result.success) {
                    const { data, totalPages: pages } = result;
                    totalPages = pages;
                    
                    if (data && data.length > 0) {
                        grid.innerHTML = data.map(item => `
                            <div class="gallery-card">
                                ${item.is_featured ? '<div class="featured-badge"><i class="fas fa-star"></i> Featured</div>' : ''}
                                <div class="type-badge">
                                    <i class="fas ${item.type === 'image' ? 'fa-image' : 'fa-video'}"></i>
                                    ${item.type}
                                </div>
                                
                                ${item.type === 'video' ? `
                                    <video src="${item.file_url}" muted></video>
                                ` : `
                                    <img src="${item.file_url}" alt="${GalleryModule.helpers.escapeHtml(item.title)}">
                                `}
                                
                                <div class="gallery-info">
                                    <div class="gallery-title">${GalleryModule.helpers.escapeHtml(item.title)}</div>
                                    <div class="gallery-meta">
                                        <span><i class="far fa-calendar-alt"></i> ${GalleryModule.helpers.formatDate(item.created_at)}</span>
                                    </div>
                                    <div class="card-actions">
                                        <button class="action-btn feature-btn" onclick="toggleFeatured('${item.id}', ${item.is_featured})">
                                            ${item.is_featured ? '★ Unfeature' : '☆ Feature'}
                                        </button>
                                        <button class="action-btn edit-btn" onclick="editItem('${item.id}')">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="action-btn delete-btn" onclick="deleteItem('${item.id}')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px;">No items found</div>';
                    }
                    
                    renderPagination();
                }
            }

            function renderPagination() {
                const pagination = document.getElementById('pagination');
                
                if (totalPages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }
                
                let html = '';
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" 
                            onclick="changePage(${i})">${i}</button>`;
                }
                
                pagination.innerHTML = html;
            }

            window.changePage = function(page) {
                currentPage = page;
                loadGallery();
            };

            window.applyFilters = function() {
                currentFilters.search = document.getElementById('searchInput').value;
                currentFilters.type = document.getElementById('typeFilter').value;
                currentFilters.sort = document.getElementById('sortFilter').value;
                currentPage = 1;
                loadGallery();
            };

            window.debounceSearch = function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    applyFilters();
                }, 500);
            };

            window.showUploadModal = function() {
                document.getElementById('uploadModal').classList.add('show');
                document.getElementById('uploadForm').reset();
                document.getElementById('filePreview').style.display = 'none';
            };

            window.closeUploadModal = function() {
                document.getElementById('uploadModal').classList.remove('show');
            };

            window.switchUploadTab = function(type) {
                document.querySelectorAll('.upload-tab').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                document.getElementById('mediaType').value = type;
                
                const fileInput = document.getElementById('mediaFile');
                fileInput.accept = type === 'image' ? 'image/*' : 'video/*';
                
                const hint = document.getElementById('fileHint');
                hint.textContent = type === 'image' 
                    ? 'Supports: JPG, PNG, GIF (Max 10MB)'
                    : 'Supports: MP4, WebM (Max 50MB)';
            };

            window.previewFile = function(input) {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const preview = document.getElementById('filePreview');
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            };

            document.getElementById('uploadForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const type = document.getElementById('mediaType').value;
                const file = document.getElementById('mediaFile').files[0];
                const title = document.getElementById('mediaTitle').value;
                const description = document.getElementById('mediaDescription').value;
                const isFeatured = document.getElementById('isFeatured').checked;
                
                if (!file) {
                    alert('Please select a file');
                    return;
                }
                
                let result;
                if (type === 'image') {
                    result = await GalleryModule.uploadImage(file, title, description, isFeatured);
                } else {
                    result = await GalleryModule.uploadVideo(file, title, description, isFeatured);
                }
                
                if (result.success) {
                    alert('Upload successful!');
                    closeUploadModal();
                    loadGallery();
                } else {
                    alert('Upload failed: ' + result.error);
                }
            });

            window.toggleFeatured = async function(itemId, current) {
                const result = await GalleryModule.toggleFeatured(itemId, !current);
                if (result.success) {
                    loadGallery();
                }
            };

            window.deleteItem = async function(itemId) {
                if (!confirm('Are you sure you want to delete this item?')) return;
                
                const result = await GalleryModule.deleteGalleryItem(itemId);
                if (result.success) {
                    alert('Item deleted');
                    loadGallery();
                }
            };

            window.editItem = function(itemId) {
                alert('Edit functionality coming soon!');
            };

            window.logout = async function() {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            };
        })();
    </script>
</body>
</html>
