<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #b3412e 0%, #8b2c1d 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        .sidebar-header h3 {
            font-size: 18px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: gold;
        }

        .menu-item i {
            width: 22px;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .top-bar {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            color: #2d1f00;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: none;
            border: 2px solid #f3b28a;
            color: #b3412e;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-container {
            background: white;
            border-radius: 30px 10px 30px 10px;
            padding: 30px;
        }

        .settings-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f3b28a;
            padding-bottom: 15px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f0f0;
            color: #666;
        }

        .tab-btn.active {
            background: #b3412e;
            color: white;
        }

        .settings-panel {
            display: none;
        }

        .settings-panel.active {
            display: block;
        }

        .panel-title {
            color: #2d1f00;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d1f00;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 15px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #b3412e;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .save-btn {
            background: linear-gradient(45deg, #b3412e, #c94b1f);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .message {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #e8f5e9;
            color: #27ae60;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message.error {
            background: #fee;
            color: #e74c3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b3412e;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }
            .sidebar-header h3, .sidebar-header p, .menu-item span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo">
            <h3 id="adminName">Admin</h3>
            <p>Super Admin</p>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="members.html" class="menu-item"><i class="fas fa-users"></i><span>Members</span></a>
            <a href="events.html" class="menu-item"><i class="fas fa-calendar-alt"></i><span>Events</span></a>
            <a href="news.html" class="menu-item"><i class="fas fa-newspaper"></i><span>News</span></a>
            <a href="gallery.html" class="menu-item"><i class="fas fa-images"></i><span>Gallery</span></a>
            <a href="donations.html" class="menu-item"><i class="fas fa-hand-holding-heart"></i><span>Donations</span></a>
            <a href="documents.html" class="menu-item"><i class="fas fa-file-pdf"></i><span>Documents</span></a>
            <a href="contacts.html" class="menu-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <a href="committee.html" class="menu-item"><i class="fas fa-user-tie"></i><span>Committee</span></a>
            <div class="menu-divider"></div>
            <a href="settings.html" class="menu-item active"><i class="fas fa-cog"></i><span>Settings</span></a>
            <a href="#" class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title"><i class="fas fa-cog"></i><span>Settings</span></div>
            <div class="admin-info">
                <span id="headerAdminName">Admin</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="settings-container">
            <div id="message" class="message"></div>
            <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading settings...</div>

            <div id="settingsContent" style="display: none;">
                <div class="settings-tabs">
                    <button class="tab-btn active" onclick="switchTab('general')">General</button>
                    <button class="tab-btn" onclick="switchTab('social')">Social Media</button>
                    <button class="tab-btn" onclick="switchTab('membership')">Membership</button>
                    <button class="tab-btn" onclick="switchTab('contact')">Contact</button>
                    <button class="tab-btn" onclick="switchTab('payment')">Payment</button>
                    <button class="tab-btn" onclick="switchTab('seo')">SEO</button>
                </div>

                <!-- General Settings -->
                <div id="panel-general" class="settings-panel active">
                    <h2 class="panel-title">General Settings</h2>
                    <div class="form-group">
                        <label>Organization Name</label>
                        <input type="text" id="org_name" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Short Name</label>
                        <input type="text" id="org_short_name" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Registration Number</label>
                        <input type="text" id="reg_number" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Established Year</label>
                        <input type="text" id="est_year" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Website URL</label>
                        <input type="url" id="website_url" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Mission Statement</label>
                        <textarea id="mission" rows="3" class="setting-field"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Vision Statement</label>
                        <textarea id="vision" rows="3" class="setting-field"></textarea>
                    </div>
                    <button class="save-btn" onclick="saveSettings('general')">Save General Settings</button>
                </div>

                <!-- Social Media -->
                <div id="panel-social" class="settings-panel">
                    <h2 class="panel-title">Social Media Links</h2>
                    <div class="form-group">
                        <label>Facebook</label>
                        <input type="url" id="facebook" class="setting-field" placeholder="https://facebook.com/...">
                    </div>
                    <div class="form-group">
                        <label>Twitter</label>
                        <input type="url" id="twitter" class="setting-field" placeholder="https://twitter.com/...">
                    </div>
                    <div class="form-group">
                        <label>Instagram</label>
                        <input type="url" id="instagram" class="setting-field" placeholder="https://instagram.com/...">
                    </div>
                    <div class="form-group">
                        <label>YouTube</label>
                        <input type="url" id="youtube" class="setting-field" placeholder="https://youtube.com/...">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="text" id="whatsapp" class="setting-field" placeholder="+91...">
                    </div>
                    <button class="save-btn" onclick="saveSettings('social')">Save Social Media</button>
                </div>

                <!-- Membership -->
                <div id="panel-membership" class="settings-panel">
                    <h2 class="panel-title">Membership Settings</h2>
                    <div class="form-group">
                        <label>Membership Fee (₹)</label>
                        <input type="number" id="membership_fee" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Currency</label>
                        <select id="currency" class="setting-field">
                            <option value="INR">INR (₹)</option>
                            <option value="USD">USD ($)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Member ID Prefix</label>
                        <input type="text" id="member_prefix" class="setting-field" value="AHBBM">
                    </div>
                    <div class="form-group">
                        <label>Default Status</label>
                        <select id="default_status" class="setting-field">
                            <option value="pending">Pending Approval</option>
                            <option value="approved">Auto Approved</option>
                        </select>
                    </div>
                    <button class="save-btn" onclick="saveSettings('membership')">Save Membership Settings</button>
                </div>

                <!-- Contact -->
                <div id="panel-contact" class="settings-panel">
                    <h2 class="panel-title">Contact Information</h2>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" rows="3" class="setting-field"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone 1</label>
                            <input type="text" id="phone1" class="setting-field">
                        </div>
                        <div class="form-group">
                            <label>Phone 2</label>
                            <input type="text" id="phone2" class="setting-field">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email 1</label>
                            <input type="email" id="email1" class="setting-field">
                        </div>
                        <div class="form-group">
                            <label>Email 2</label>
                            <input type="email" id="email2" class="setting-field">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Office Hours</label>
                        <input type="text" id="office_hours" class="setting-field">
                    </div>
                    <button class="save-btn" onclick="saveSettings('contact')">Save Contact Info</button>
                </div>

                <!-- Payment -->
                <div id="panel-payment" class="settings-panel">
                    <h2 class="panel-title">Payment Settings</h2>
                    <div class="form-group">
                        <label>Razorpay Key ID</label>
                        <input type="text" id="razorpay_key" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Payment Mode</label>
                        <select id="payment_mode" class="setting-field">
                            <option value="test">Test Mode</option>
                            <option value="live">Live Mode</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Minimum Donation (₹)</label>
                        <input type="number" id="min_donation" class="setting-field">
                    </div>
                    <button class="save-btn" onclick="saveSettings('payment')">Save Payment Settings</button>
                </div>

                <!-- SEO -->
                <div id="panel-seo" class="settings-panel">
                    <h2 class="panel-title">SEO Settings</h2>
                    <div class="form-group">
                        <label>Meta Title</label>
                        <input type="text" id="meta_title" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Meta Description</label>
                        <textarea id="meta_description" rows="3" class="setting-field"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Meta Keywords</label>
                        <input type="text" id="meta_keywords" class="setting-field">
                    </div>
                    <div class="form-group">
                        <label>Google Analytics ID</label>
                        <input type="text" id="ga_id" class="setting-field">
                    </div>
                    <button class="save-btn" onclick="saveSettings('seo')">Save SEO Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        const SUPABASE_URL = 'https://rhslmpccqrfgsaqhwwnl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc2xtcGNjcXJmZ3NhcWh3d25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU0ODEsImV4cCI6MjA4OTIzMTQ4MX0.D3CJvzcSkaFZivDJtIXdKgFO3jUPBOq8i80Vz98eYcw';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check auth
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            
            const storedAdmin = sessionStorage.getItem('adminInfo');
            if (storedAdmin) {
                const admin = JSON.parse(storedAdmin);
                document.getElementById('adminName').textContent = admin.name;
                document.getElementById('headerAdminName').textContent = admin.name;
            }
            
            await loadSettings();
        });

        async function loadSettings() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('settingsContent').style.display = 'none';
                
                const { data, error } = await supabase
                    .from('settings')
                    .select('*');
                
                if (error) throw error;
                
                // Create a map of settings
                const settings = {};
                if (data) {
                    data.forEach(item => {
                        settings[item.key] = item.value;
                    });
                }
                
                // Populate all fields
                document.querySelectorAll('.setting-field').forEach(field => {
                    const id = field.id;
                    if (settings[id] !== undefined) {
                        field.value = settings[id];
                    }
                });
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('settingsContent').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading settings:', error);
                document.getElementById('loading').innerHTML = '<i class="fas fa-exclamation-circle"></i> Failed to load settings. Please refresh.';
            }
        }

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.settings-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById(`panel-${tab}`).classList.add('active');
        };

        window.saveSettings = async function(panel) {
            try {
                const fields = document.querySelectorAll(`#panel-${panel} .setting-field`);
                
                showMessage('Saving...', 'info');
                
                // Update each setting
                for (const field of fields) {
                    const { error } = await supabase
                        .from('settings')
                        .upsert(
                            { 
                                key: field.id, 
                                value: field.value,
                                updated_at: new Date().toISOString()
                            },
                            { 
                                onConflict: 'key'  // This fixes the 409 error
                            }
                        );
                    
                    if (error) throw error;
                }
                
                showMessage('✅ Settings saved successfully!', 'success');
                
            } catch (error) {
                console.error('Error saving settings:', error);
                showMessage('❌ Error: ' + (error.message || 'Failed to save settings'), 'error');
            }
        };

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            
            let icon = 'fa-info-circle';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            
            msgDiv.innerHTML = `<i class="fas ${icon}"></i> ${text}`;
            
            // Auto hide after 3 seconds for success/info
            if (type !== 'error') {
                setTimeout(() => {
                    msgDiv.className = 'message';
                }, 3000);
            }
        }

        window.logout = async function() {
            await supabase.auth.signOut();
            sessionStorage.removeItem('adminInfo');
            window.location.href = 'login.html';
        };
    })();
</script>
</body>
</html>
