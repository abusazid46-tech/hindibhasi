<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery - Asom Hindi Bhasi Brahman Mahasabha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
</head>
<body>
    <header>
        <!-- Same header -->
        <div class="logo-area">
            <img src="assets/images/logo.png" alt="Brahman Mahasabha logo">
            <h2>Asom Hindi Bhasi Brahman Mahasabha</h2>
        </div>
        <div class="right-controls">
            <div class="lang-switch">
                <button class="lang-option en active" onclick="setLanguage('en')">EN</button>
                <button class="lang-option hi" onclick="setLanguage('hi')">HI</button>
                <button class="lang-option as" onclick="setLanguage('as')">AS</button>
            </div>
            <div class="menu-dropdown">
                <div class="hamburger" aria-label="menu" role="button" tabindex="0">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="dropdown-content">
                    <a href="index.html"><i class="fas fa-home"></i> Home</a>
                    <a href="about.html"><i class="fas fa-users"></i> About</a>
                    <a href="members.html"><i class="fas fa-address-book"></i> Members</a>
                    <a href="events.html"><i class="fas fa-calendar"></i> Events</a>
                    <a href="news.html"><i class="fas fa-newspaper"></i> News</a>
                    <a href="photo-gallery.html"><i class="fas fa-images"></i> Gallery</a>
                    <a href="donation.html"><i class="fas fa-hand-holding-heart"></i> Donate</a>
                    <a href="documents.html"><i class="fas fa-file-alt"></i> Documents</a>
                    <a href="contact.html"><i class="fas fa-phone-alt"></i> Contact</a>
                </div>
            </div>
        </div>
    </header>

    <section class="page-header">
        <h1>Photo Gallery</h1>
        <div class="breadcrumb">
            <a href="index.html">Home</a> / <span>Photo Gallery</span>
        </div>
    </section>

    <section class="section">
        <div class="gallery-categories">
            <button class="category-btn active" onclick="filterGallery('all')">All Photos</button>
            <button class="category-btn" onclick="filterGallery('events')">Events</button>
            <button class="category-btn" onclick="filterGallery('meetings')">Meetings</button>
            <button class="category-btn" onclick="filterGallery('cultural')">Cultural Programs</button>
            <button class="category-btn" onclick="filterGallery('charity')">Charity Events</button>
        </div>

        <div class="gallery-grid" id="photoGallery">
            <!-- Photos will be loaded here -->
        </div>

        <div class="load-more">
            <button class="btn" onclick="loadMorePhotos()" id="loadMoreBtn">Load More</button>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Asom Hindi Bhasi Brahman Mahasabha | All Rights Reserved</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentPage = 1;
        let currentCategory = 'all';
        const limit = 12;
        let totalCount = 0;

        async function loadGallery(page = 1, append = false) {
            try {
                const { data, count } = await GalleryAPI.getGallery('image', page, limit);
                totalCount = count;

                const gallery = document.getElementById('photoGallery');
                
                if (!append) {
                    gallery.innerHTML = '';
                }

                const photos = currentCategory === 'all' ? 
                    data : 
                    data.filter(p => p.category === currentCategory);

                photos.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <a href="${photo.file_url}" data-lightbox="gallery" data-title="${photo.title}">
                            <img src="${photo.file_url}" alt="${photo.title}" loading="lazy">
                            <div class="gallery-caption">
                                <h4>${photo.title}</h4>
                                <p>${new Date(photo.created_at).toLocaleDateString()}</p>
                            </div>
                        </a>
                    `;
                    gallery.appendChild(item);
                });

                // Show/hide load more button
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (page * limit >= totalCount) {
                    loadMoreBtn.style.display = 'none';
                } else {
                    loadMoreBtn.style.display = 'inline-block';
                }

                // Refresh lightbox
                lightbox.option({
                    'resizeDuration': 200,
                    'wrapAround': true,
                    'albumLabel': 'Image %1 of %2'
                });
            } catch (error) {
                console.error('Error loading gallery:', error);
            }
        }

        function filterGallery(category) {
            currentCategory = category;
            currentPage = 1;
            
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            loadGallery(1);
        }

        function loadMorePhotos() {
            currentPage++;
            loadGallery(currentPage, true);
        }

        document.addEventListener('DOMContentLoaded', () => loadGallery(1));
    </script>
</body>
</html>
