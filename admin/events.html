<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #b3412e 0%, #8b2c1d 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid gold;
            margin-bottom: 15px;
        }

        .sidebar-header h3 {
            font-size: 18px;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: gold;
        }

        .menu-item i {
            width: 22px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .top-bar {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-size: 24px;
            color: #2d1f00;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-bar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }

        .search-box {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 14px;
        }

        .filter-select {
            flex: 1;
            min-width: 150px;
        }

        .filter-select select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 14px;
            background: white;
        }

        .events-table-container {
            background: white;
            border-radius: 30px 10px 30px 10px;
            padding: 25px;
            overflow-x: auto;
        }

        .events-table {
            width: 100%;
            border-collapse: collapse;
        }

        .events-table th {
            text-align: left;
            padding: 15px 10px;
            color: #2d1f00;
            font-weight: 600;
            border-bottom: 3px solid #3498db;
        }

        .events-table td {
            padding: 15px 10px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        .event-image {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-upcoming {
            background: #e8f0fe;
            color: #3498db;
        }

        .status-completed {
            background: #e8f5e9;
            color: #27ae60;
        }

        .status-cancelled {
            background: #fee;
            color: #e74c3c;
        }

        .action-btns {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .edit-btn {
            background: #f39c12;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .featured-btn {
            background: #f1c40f;
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border: 2px solid #3498db;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .page-btn.active {
            background: #3498db;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 40px 10px 40px 10px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d1f00;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f3b28a;
            border-radius: 15px;
            font-size: 15px;
        }

        .form-group.checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group.checkbox input {
            width: auto;
        }

        .save-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }
            .sidebar-header h3, .sidebar-header p, .menu-item span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/XrStw9KC/1772529038848.png" alt="Logo">
            <h3 id="adminName">Admin</h3>
            <p>Admin</p>
        </div>
        
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="members.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span>Members</span>
            </a>
            <a href="events.html" class="menu-item active">
                <i class="fas fa-calendar-alt"></i>
                <span>Events</span>
            </a>
            <a href="news.html" class="menu-item">
                <i class="fas fa-newspaper"></i>
                <span>News</span>
            </a>
            <a href="gallery.html" class="menu-item">
                <i class="fas fa-images"></i>
                <span>Gallery</span>
            </a>
            <a href="donations.html" class="menu-item">
                <i class="fas fa-hand-holding-heart"></i>
                <span>Donations</span>
            </a>
            <a href="documents.html" class="menu-item">
                <i class="fas fa-file-pdf"></i>
                <span>Documents</span>
            </a>
            <a href="contacts.html" class="menu-item">
                <i class="fas fa-envelope"></i>
                <span>Messages</span>
            </a>
            <div class="menu-divider"></div>
            <a href="#" class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <i class="fas fa-calendar-alt"></i>
                <span>Event Management</span>
            </div>
            <button class="add-btn" onclick="showAddModal()">
                <i class="fas fa-plus"></i> Add New Event
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search events..." onkeyup="debounceSearch()">
            </div>
            
            <div class="filter-select">
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="all">All Status</option>
                    <option value="upcoming">Upcoming</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            
            <div class="filter-select">
                <select id="sortFilter" onchange="applyFilters()">
                    <option value="upcoming">Upcoming First</option>
                    <option value="past">Past First</option>
                    <option value="title">By Title</option>
                </select>
            </div>
        </div>

        <!-- Events Table -->
        <div class="events-table-container">
            <table class="events-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Venue</th>
                        <th>Status</th>
                        <th>Featured</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="eventsTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            <i class="fas fa-spinner fa-spin"></i> Loading events...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Event Modal -->
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Event</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="eventForm">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="eventTitle" required>
                </div>
                
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="eventDescription" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Event Date *</label>
                    <input type="date" id="eventDate" required>
                </div>
                
                <div class="form-group">
                    <label>Event Time</label>
                    <input type="time" id="eventTime">
                </div>
                
                <div class="form-group">
                    <label>Venue *</label>
                    <input type="text" id="eventVenue" required>
                </div>
                
                <div class="form-group">
                    <label>Event Image</label>
                    <input type="file" id="eventImage" accept="image/*">
                    <img id="imagePreview" style="width: 100px; height: 100px; object-fit: cover; margin-top: 10px; display: none;">
                </div>
                
                <div class="form-group checkbox">
                    <input type="checkbox" id="registrationRequired">
                    <label>Registration Required</label>
                </div>
                
                <div id="registrationFields" style="display: none;">
                    <div class="form-group">
                        <label>Registration Deadline</label>
                        <input type="date" id="registrationDeadline">
                    </div>
                    
                    <div class="form-group">
                        <label>Max Participants</label>
                        <input type="number" id="maxParticipants">
                    </div>
                </div>
                
                <div class="form-group checkbox">
                    <input type="checkbox" id="isFeatured">
                    <label>Feature this Event</label>
                </div>
                
                <div class="form-group">
                    <label>Status</label>
                    <select id="eventStatus">
                        <option value="upcoming">Upcoming</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                
                <button type="submit" class="save-btn" id="saveBtn">Save Event</button>
            </form>
        </div>
    </div>

    <script src="../js/events.js"></script>
    <script>
        (function() {
            const SUPABASE_URL = 'https://rhslmpccqrfgsaqhwwnl.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoc2xtcGNjcXJmZ3NhcWh3d25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTU0ODEsImV4cCI6MjA4OTIzMTQ4MX0.D3CJvzcSkaFZivDJtIXdKgFO3jUPBOq8i80Vz98eYcw';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // Initialize EventsModule
            EventsModule.init(supabase);

            // State
            let currentPage = 1;
            let totalPages = 1;
            let currentFilters = {
                status: 'all',
                search: '',
                sort: 'upcoming'
            };
            let searchTimeout;
            let editingEventId = null;
            let selectedFile = null;

            // Check auth
            document.addEventListener('DOMContentLoaded', async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = 'login.html';
                    return;
                }
                loadEvents();
            });

            async function loadEvents() {
    const tbody = document.getElementById('eventsTableBody');
    
    const result = await EventsModule.getAllEventsForAdmin(currentFilters, currentPage, 10);
    
    if (result.success) {
        const { data, totalPages: pages } = result;
        totalPages = pages;
        
        if (data && data.length > 0) {
            tbody.innerHTML = data.map(event => `
                <tr>
                    <td>
                        <div style="position: relative; width: 60px; height: 60px;">
                            ${event.image_url ? 
                                `<img src="${event.image_url}" 
                                     style="width:60px; height:60px; object-fit:cover; border-radius:10px;"
                                     onerror="this.style.display='none'; this.parentElement.querySelector('.fallback-icon').style.display='flex';">` 
                                : ''
                            }
                            <div class="fallback-icon" 
                                 style="display: ${event.image_url ? 'none' : 'flex'}; 
                                        width:60px; 
                                        height:60px; 
                                        background: linear-gradient(135deg, #3498db, #2980b9); 
                                        border-radius:10px; 
                                        align-items:center; 
                                        justify-content:center; 
                                        color:white;
                                        font-size:24px;">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                        </div>
                    </td>
                    <td>
                        <strong>${EventsModule.helpers.escapeHtml(event.title)}</strong>
                    </td>
                    <td>${EventsModule.helpers.formatDate(event.event_date)}<br>
                        <small>${event.event_time || 'Time TBA'}</small>
                    </td>
                    <td>${EventsModule.helpers.escapeHtml(event.venue)}</td>
                    <td>
                        <span class="status-badge status-${event.status}">
                            ${event.status}
                        </span>
                    </td>
                    <td>
                        <button class="action-btn featured-btn" onclick="toggleFeatured('${event.id}', ${event.is_featured})">
                            ${event.is_featured ? '★ Featured' : '☆ Feature'}
                        </button>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn edit-btn" onclick="editEvent('${event.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn delete-btn" onclick="deleteEvent('${event.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        } else {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px;"><i class="fas fa-calendar-times"></i> No events found</td></tr>';
        }
        
        renderPagination();
    } else {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: #e74c3c;">Error loading events: ' + result.error + '</td></tr>';
    }
}
            function renderPagination() {
                const pagination = document.getElementById('pagination');
                
                if (totalPages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }
                
                let html = '';
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" 
                            onclick="changePage(${i})">${i}</button>`;
                }
                
                pagination.innerHTML = html;
            }

            window.changePage = function(page) {
                currentPage = page;
                loadEvents();
            };

            window.applyFilters = function() {
                currentFilters.search = document.getElementById('searchInput').value;
                currentFilters.status = document.getElementById('statusFilter').value;
                currentFilters.sort = document.getElementById('sortFilter').value;
                currentPage = 1;
                loadEvents();
            };

            window.debounceSearch = function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    applyFilters();
                }, 500);
            };

            window.showAddModal = function() {
                editingEventId = null;
                document.getElementById('modalTitle').textContent = 'Add New Event';
                document.getElementById('eventForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('registrationFields').style.display = 'none';
                document.getElementById('eventModal').classList.add('show');
            };

            window.editEvent = async function(eventId) {
                const result = await EventsModule.getEventById(eventId);
                
                if (result.success) {
                    const event = result.data;
                    editingEventId = eventId;
                    
                    document.getElementById('modalTitle').textContent = 'Edit Event';
                    document.getElementById('eventTitle').value = event.title;
                    document.getElementById('eventDescription').value = event.description;
                    document.getElementById('eventDate').value = event.event_date;
                    document.getElementById('eventTime').value = event.event_time || '';
                    document.getElementById('eventVenue').value = event.venue;
                    document.getElementById('registrationRequired').checked = event.registration_required || false;
                    document.getElementById('registrationDeadline').value = event.registration_deadline || '';
                    document.getElementById('maxParticipants').value = event.max_participants || '';
                    document.getElementById('isFeatured').checked = event.is_featured || false;
                    document.getElementById('eventStatus').value = event.status || 'upcoming';
                    
                    if (event.registration_required) {
                        document.getElementById('registrationFields').style.display = 'block';
                    }
                    
                    if (event.image_url) {
                        const preview = document.getElementById('imagePreview');
                        preview.src = event.image_url;
                        preview.style.display = 'block';
                    }
                    
                    document.getElementById('eventModal').classList.add('show');
                }
            };

            document.getElementById('registrationRequired').addEventListener('change', function() {
                document.getElementById('registrationFields').style.display = this.checked ? 'block' : 'none';
            });

            document.getElementById('eventImage').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    selectedFile = file;
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const preview = document.getElementById('imagePreview');
                        preview.src = e.target.result;
                        preview.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('eventForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const eventData = {
                    title: document.getElementById('eventTitle').value,
                    description: document.getElementById('eventDescription').value,
                    event_date: document.getElementById('eventDate').value,
                    event_time: document.getElementById('eventTime').value || null,
                    venue: document.getElementById('eventVenue').value,
                    registration_required: document.getElementById('registrationRequired').checked,
                    registration_deadline: document.getElementById('registrationDeadline').value || null,
                    max_participants: document.getElementById('maxParticipants').value || null,
                    is_featured: document.getElementById('isFeatured').checked,
                    status: document.getElementById('eventStatus').value
                };
                
                let result;
                if (editingEventId) {
                    result = await EventsModule.updateEvent(editingEventId, eventData, selectedFile);
                } else {
                    result = await EventsModule.createEvent(eventData, selectedFile);
                }
                
                if (result.success) {
                    alert(editingEventId ? 'Event updated!' : 'Event created!');
                    closeModal();
                    loadEvents();
                } else {
                    alert('Error: ' + result.error);
                }
            });

            window.toggleFeatured = async function(eventId, current) {
                const result = await EventsModule.toggleFeatured(eventId, !current);
                if (result.success) {
                    loadEvents();
                }
            };

            window.deleteEvent = async function(eventId) {
                if (!confirm('Are you sure you want to delete this event?')) return;
                
                const result = await EventsModule.deleteEvent(eventId);
                if (result.success) {
                    alert('Event deleted');
                    loadEvents();
                }
            };

            window.closeModal = function() {
                document.getElementById('eventModal').classList.remove('show');
                selectedFile = null;
            };

            window.logout = async function() {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            };
        })();
    </script>
</body>
</html>
